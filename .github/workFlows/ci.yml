name: Frontend CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 🛠️ 패키지 설치
        run: npm ci

      - name: 🧹 린트 검사
        run: npm run lint

      - name: 🔎 타입 체크
        run: npx tsc --noEmit